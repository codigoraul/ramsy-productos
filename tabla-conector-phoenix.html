<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conector SACC - Especificaciones</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .table-wrapper {
      max-width: 600px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .table-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      padding: 24px 28px;
    }

    .table-header h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .table-header p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.65);
      font-weight: 400;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background-color 0.15s ease;
    }

    tr:last-child {
      border-bottom: none;
    }

    tr:hover {
      background-color: #fafbff;
    }

    td {
      padding: 14px 28px;
      font-size: 14px;
      vertical-align: middle;
    }

    td:first-child {
      color: #666;
      font-weight: 500;
      width: 50%;
    }

    td:last-child {
      color: #1a1a2e;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-blue {
      background: #e8f0fe;
      color: #1a56db;
    }

    .badge-green {
      background: #e6f7ed;
      color: #0d7a3e;
    }

    .badge-red {
      background: #fde8e8;
      color: #c81e1e;
    }

    @media (max-width: 480px) {
      .table-header {
        padding: 18px 20px;
      }
      td {
        padding: 12px 20px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="table-wrapper">
    <div class="table-header">
      <h2>Conector circular (lado del cable)</h2>
      <p>Phoenix Contact &mdash; Especificaciones t&eacute;cnicas</p>
    </div>
    <table>
      <tbody>
        <tr>
          <td>Tipo de producto</td>
          <td>Conector circular (lado del cable)</td>
        </tr>
        <tr>
          <td>Tipo de sensor</td>
          <td><span class="badge badge-blue">Universal</span></td>
        </tr>
        <tr>
          <td>N&uacute;mero de polos</td>
          <td>5</td>
        </tr>
        <tr>
          <td>N&uacute;mero de salidas de cable</td>
          <td>1</td>
        </tr>
        <tr>
          <td>Apantallado</td>
          <td><span class="badge badge-red">No</span></td>
        </tr>
        <tr>
          <td>Codificaci&oacute;n</td>
          <td><span class="badge badge-green">A</span></td>
        </tr>
        <tr>
          <td>Salida de cables</td>
          <td>Recta</td>
        </tr>
        <tr>
          <td>Prensaestopas Pg</td>
          <td>Pg9</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
